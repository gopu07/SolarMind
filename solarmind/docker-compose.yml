version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: ./dashboard
    ports:
      - "5174:5174"
    volumes:
      - ./dashboard/src:/app/src
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
