version: '3.8'

services:
  backend:
    build: .
    container_name: solarmind-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=INFO
    volumes:
      - .:/app
    networks:
      - solarmind-network

  dashboard:
    build: ./dashboard
    container_name: solarmind-dashboard
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - solarmind-network

networks:
  solarmind-network:
    driver: bridge
